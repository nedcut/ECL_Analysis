[tool:pytest]
# Pytest configuration for Brightness Sorcerer

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum version requirements
minversion = 7.0

# Add options
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=brightness_sorcerer
    --cov=main
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
    --junitxml=test-results.xml
    --html=test-report.html
    --self-contained-html

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, with dependencies)
    gui: GUI tests (require display)
    slow: Slow tests (>5 seconds)
    video: Tests requiring video files
    audio: Tests requiring audio functionality
    performance: Performance benchmarking tests
    smoke: Basic smoke tests for CI

# Test session timeout
timeout = 300

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning
    ignore:.*Qt.*:UserWarning

# Environment variables for testing
env =
    QT_QPA_PLATFORM=offscreen